#南极洲国家
 ZZZ_Antarctic_Anarchy: "南极荒原"
 ZZZ_Antarctic_Anarchy_desc: "南极洲存在的少量生命往往栖息在海岸边，在那里海洋至少为它们 bleak 的生活提供了一些慰藉。越接近这片冰冻大陆的黑暗中心，地形就变得越不适于生存。锋利的雪面波纹、无底的冰裂缝和雪盲症都在挑战着生命的存在。只有新到来的人类才会如此愚蠢地冒险进入这样的地方。"
