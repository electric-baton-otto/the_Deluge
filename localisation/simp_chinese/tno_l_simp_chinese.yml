 #新闻
 tno_news.1.t: "[ARG.GetName]赢得南奥克尼战争"
 tno_news.1.desc: "今天早些，[ENG.GetNameDef]和[ARG.GetNameDef]的代表齐聚蒙得维的亚，商讨解决南奥克尼战争。此次和平会议决定[ENG.GetNameDef]应允许阿根廷在南奥克尼群岛永久驻军。\n\n由于[ENG.GetNameDef]在未能夺取群岛后在南大西洋的处境日益艰难，[ENG.GetLeader]政府认为除了签署所提出的协议外别无选择。"
 tno_news.1.a: "这是一场灾难！" #eng
 tno_news.1.b: "[ROOT.GetNameDef]的又一胜利。" #arg
 tno_news.1.c: "一个有趣的事态发展。"

 tno_news.2.t: "[ENG.GetName]赢得南奥克尼战争"
 tno_news.2.desc: "今天早些，[ENG.GetNameDef]和[ARG.GetNameDef]的代表齐聚里约热内卢，商讨结束南奥克尼战争。此次和平会议决定[ARG.GetNameDef]应永久撤出所有在南纬60°以南的军队，并且[ARG.GetNameDef]将停止所有与南极洲相关的活动。\n\n由于[ARG.GetNameDef]在南奥克尼的主力部队已经投降，[ARG.GetLeader]认为除了签署所提出的协议外别无选择。"
 tno_news.2.a: "[ROOT.GetNameDef]的又一胜利。" #eng
 tno_news.2.b: "这是一场灾难！" #arg
 tno_news.2.c: "一个有趣的事态发展。"

 tno_news.3.t: "南奥克尼战争"
 tno_news.3.desc: "尽管许多人希望南美洲实现持久和平，但最近因[ARG.GetNameDef] militarize 南奥克尼群岛而引发的事件，源于南大西洋的争端，已演变成一场全面战争。\n\n由于[ARG.GetNameDef]和[ENG.GetNameDef]相互指责对方发动战争，据推测[ENG.GetAdjective]军队正在准备对群岛进行两栖攻击，而[ARG.GetAdjective]军方则被证实正在加强群岛的防御。"
 tno_news.3.a: "我们将粉碎他们。" #eng
 tno_news.3.b: "蠢货。" #arg
 tno_news.3.c: "真是多事之秋。"

#通用
 antarctica.2.t: "[FROM.FROM.GetCapitalVictoryPointName]的研究设施"
 antarctica.2.desc: "我们将在[FROM.FROM.GetCapitalVictoryPointName]建造哪种类型的设施？"
 antarctica.2.a: "建造陆地设施以便在严冬条件下测试是审慎的。"
 antarctica.2.b: "有人提到海军了吗？"
 antarctica.2.c: "空气动力学设施将是我们基地的一个很好的补充。"
 antarctica.2.d: "没有国家会在这里找到我们的核秘密！"


#德国
 GER_antarctica.1.t: "[GetYear]年德国南极探险"
 GER_antarctica.1.desc: "施瓦本兰号的主要目标是经济性质的，特别是建立捕鲸站和为德国捕鲸船队获取渔场，以减少帝国对工业油、脂肪和膳食脂肪进口的依赖。准备工作在严格保密下进行，因为该企业还负责对未来占领西经20°至东经20°之间南极领土的可行性进行评估。"
 GER_antarctica.1.a: "这听起来是个绝妙的主意！"
 GER_antarctica.1.b: "我们无法抽调这些资源。"
#阿根廷
 #事件链开始。阿根廷采取' militarize 南奥克尼群岛'决议时的事件。
 ARG_antarctica.1.t: " militarize 南奥克尼群岛"
 ARG_antarctica.1.desc: "阿根廷已向国际社会通报了在南奥克尼群岛建立永久基地的事宜。该站迄今为止一直隶属于农业部，直到有机会解除文职管理并将其替换为阿根廷海军人员。\n转移人员可能使我们能够进一步增加阿根廷在南极洲的存在。\n我们应该这样做吗？"
 ARG_antarctica.1.a: "解除文职管理。"
 ARG_antarctica.1.b: "再考虑一下..."

 #当英国不采取任何行动时给阿根廷的事件。
 ARG_antarctica.2.t: "[ENG.GetName]未干涉南奥克尼事务"
 ARG_antarctica.2.desc: "正如我们所料，[ENG.GetNameDef]已决定不干涉我们 militarize 南奥克尼群岛。"
 ARG_antarctica.2.a: "一切按计划进行。"

 #当英国做出强烈反应时给阿根廷的事件
 ARG_antarctica.3.t: "[ENG.GetName]抗议我们在南奥克尼的行动"
 ARG_antarctica.3.desc: "[ENG.GetLeader]已对我们的行动做出回应，拒绝让步，并威胁如果我们侵犯其对南奥克尼的主权将发动战争。战争可能迫在眉睫。"
 ARG_antarctica.3.a: "我们会让他们见识一下！"
 ARG_antarctica.3.b: "我们无能为力，让步吧。"

 #当阿根廷 militarize 南奥克尼时给英国的事件
 ARG_antarctica.4.t: "[ARG.GetName] militarize 南奥克尼群岛"
 ARG_antarctica.4.desc: "待办"
 ARG_antarctica.4.a: "要求他们立即停止。"
 ARG_antarctica.4.b: "我们现在无法处理此事。"

 # 当阿根廷拒绝离开南奥克尼时给英国的事件
 ARG_antarctica.5.t: "[ARG.GetName]拒绝离开南奥克尼群岛"
 ARG_antarctica.5.desc: "待办"
 ARG_antarctica.5.a: "我们将夺回南奥克尼。"
 ARG_antarctica.5.b: "战争不可避免，让步吧。"

 #事件链结束。阿根廷在 militarize 南奥克尼后让步时给英国的事件
 ARG_antarctica.6.t: "[ARG.GetName]让步"
 ARG_antarctica.6.desc: "待办"
 ARG_antarctica.6.a: "很好，保持群岛非军事化。" #将岛屿转移给南极无政府状态
 ARG_antarctica.6.b: "在岛上驻军，以防万一。" #使岛屿成为英国所有

 #事件链结束。当英国不想开战但提出了抗议时给阿根廷的事件。
 ARG_antarctica.7.t: "[ENG.GetName]放弃南奥克尼群岛"
 ARG_antarctica.7.desc: "面对我们两国之间爆发的战争，[ENG.GetLeader]已同意'暂时'允许阿根廷在群岛驻军。"
 ARG_antarctica.7.a: "好消息！"

 #如果阿根廷采取'要求东基地'决议，给美国的事件。
 ARG_antarctica.8.t: "[ARG.GetName]要求从[1056.GetCapitalVictoryPointName]撤军"
 ARG_antarctica.8.desc: "[ARG.GetNonIdeologyName]总统向我们发出了最后通牒，声称我们在帕默半岛的站是对其领土完整的侵犯。信函进一步指出，如果我们不开始从[1056.GetCapitalVictoryPointName]撤出，他们将自行武力夺取该地点。我们应如何回应？"
 ARG_antarctica.8.a: "我们不能冒险疏远[ARG.GetNonIdeologyName]。"
 ARG_antarctica.8.b: "他们以为自己是谁？"

 #如果美国从东基地撤军，给阿根廷的事件
 ARG_antarctica.9.t: "[USA.GetNameDefCap]放弃了东基地！"
 ARG_antarctica.9.desc: "为避免战争别无选择，[USA.GetLeader]总统已同意我们的最后通牒，目前正在撤离[1056.GetCapitalVictoryPointName]。"
 ARG_antarctica.9.a: "一场伟大的胜利！" #增加5点战争支持度

 #如果美国拒绝离开东基地，给阿根廷的事件
 ARG_antarctica.10.t: "[USA.GetNameDefCap]拒绝离开东基地！"
 ARG_antarctica.10.desc: "[USA.GetNameDef]没有认真对待我们的最后通牒，谴责了我们的行动，并准备在爆发敌对行动时保卫东基地。"
 ARG_antarctica.10.a: "[USA.GetAdjective]人是愚蠢的。" #开始边界战争 阿根廷应该在边境附近已有部队。美国将获得一个装备简陋的6宽度师进行防御。
 ARG_antarctica.10.b: "也许战争不符合[ARG.GetNameDef]的利益。" #损失50点政治点数

 #如果美国将东基地输给阿根廷，给美国的事件 #美国战败
 ARG_antarctica.11.t: "东基地陷落"
 ARG_antarctica.11.desc: "东基地已落入[ARG.GetAdjective]军队之手！我们现在该怎么办？"
 ARG_antarctica.11.a: "我们还能有什么选择？" #无事发生
 ARG_antarctica.11.b: "这还不是结局。" #获得对阿根廷的征服目标并损失10点战争支持度

 #如果阿根廷攻占东基地，给阿根廷的事件 #阿根廷胜利
 ARG_antarctica.12.t: "[ARG.GetName]突袭东基地！"
 ARG_antarctica.12.desc: "继[ARG.GetAdjective]和[USA.GetAdjective]士兵在$SOUTH_GRAHAM_LAND$发生冲突后，据报道[ARG.GetNameDef]已成功占领东基地。"
 ARG_antarctica.12.a: "一场伟大的胜利！" #阿根廷

 #美国胜利 #阿根廷战败 #僵局 的共享事件
 ARG_antarctica.13.t: "[ARG.GetAdjective]战败！"
 ARG_antarctica.13.desc: "继[ARG.GetAdjective]和[USA.GetAdjective]士兵在$SOUTH_GRAHAM_LAND$发生冲突后，[USA.GetAdjective]军队成功击退了[ARG.GetAdjective]军队。"
 ARG_antarctica.13.a: "一次教科书式的行动！" #美国
 ARG_antarctica.13.b: "不幸。" #阿根廷

 #当阿根廷建造埃斯佩兰萨基地时给智利的事件
 ARG_antarctica.15.t: "[ARG.GetName]在特里尼蒂半岛建立基地"
 ARG_antarctica.15.desc: "[ARG.GetNameDef]秘密地在特里尼蒂半岛建立了一个基地，粗暴地打破了南极的现状！我们应如何回应？"
 ARG_antarctica.15.a: "我们将质疑他们的宣称。" #允许创建南极基地。不需要部门或探险队。
 ARG_antarctica.15.b: "与我们无关。" #阿根廷将占领北特里尼蒂海岸，智利将无法建造里克尔梅·奥希金斯基地

#智利
 CHL_antarctica.1.t: "[CHL.GetAdjective]南极探险"
 CHL_antarctica.1.desc: "待办"
 CHL_antarctica.1.a: "我们应该开始着手建立一个站。"
 CHL_antarctica.1.b: "这不值得花费我们的时间。"
 CHL_antarctica.1.c: "留意[ARG.GetAdjective]或[ENG.GetAdjective]的存在。"
#法国
 FRA_antarctica.1.t: "勘测$FRA_ADELIE_LAND$"
 FRA_antarctica.1.desc: "我们对$FRA_ADELIE_LAND$的探险取得了成功，建立基地的机会已经出现。"
 FRA_antarctica.1.a: "这是个绝妙的主意！"
 FRA_antarctica.1.b: "我们不需要这个。"
#挪威
 NOR_antarctica.1.t: "捕鲸船抵达南极洲"
 NOR_antarctica.1.desc: "我们对$QUEEN_MAUD_LAND$的探险取得了成功，建立捕鲸站或基地的机会已经出现。"
 NOR_antarctica.1.a: "这是个绝妙的主意！"
 NOR_antarctica.1.b: "我们不需要这个。"
#澳大利亚
 AST_antarctica.1.t: "莫森的第三次南极探险"
 AST_antarctica.1.desc: "待办"
 AST_antarctica.1.a: "我们将采纳伊瓦特的提议。"
 AST_antarctica.1.b: "我们目前对建立永久基地没有兴趣。"
#新西兰
 
#美国
 USA_antarctica.1.t: "伯德的第三次南极探险"
 USA_antarctica.1.desc: "美国南极服务探险队的两艘船共载有125人离开美国。组成探险队的大部分人员是从军队、政府文职机构和科研机构中征召的。\n探险队的目标由[USA.GetLeader]总统的命令概述。\n总统希望建立两个基地：东基地，位于沙尔科岛附近或玛格丽特湾；以及西基地，位于爱德华七世地附近，但如果无法实现，则需调查鲸湾的一个地点，并测绘西经72°至148°之间的大陆海岸线。"
 USA_antarctica.1.a: "考虑建立基地。"
 USA_antarctica.1.b: "这些地点都不合适。终止项目。"
#英国
 
#通用
 antarctica.1.t: "我们的南极探险队归来"
 antarctica.1.desc: "我们最近的南极探险队带着 promising 的结果归来了。他们勘测了我们感兴趣的大部分区域，并选定了永久站的潜在地点。\n现在，我们是否应该在南极洲建立一个基地呢？"
 antarctica.1.a: "我们会考虑的。"
 antarctica.1.b: "再考虑一下..."



 PRC_integration_decision_soviet_states_2: "$PRC_integration_decision_soviet_states$"
 PRC_integration_decision_soviet_states_2_desc: "$PRC_integration_decision_soviet_states_desc$"
 CHI_core_asian_state_2: "$CHI_core_asian_state$"
 CHI_core_asian_state_2_desc: "$CHI_core_asian_state_desc$"
